<section class="customers-page">
  <header class="customers-page__header">
    <div class="customers-page__title-block">
      <span class="customers-page__eyebrow">CRM SYSTEM</span>
      <h1>רשימת לקוחות</h1>
      <p>
        צפייה, חיפוש וניהול של כל הלקוחות במערכת בצורה מסודרת, ברורה ונוחה.
      </p>
    </div>

    <button type="button" class="customers-page__add-btn" (click)="addCustomer()">
      הוספה
    </button>
  </header>

  <section class="customers-toolbar">
    <div class="customers-search">
      <span class="customers-search__icon">⌕</span>
      <input
        type="text"
        [(ngModel)]="searchText"
        placeholder="חיפוש לפי שם / טלפון / אימייל"
        aria-label="חיפוש לפי שם / טלפון / אימייל" />
    </div>
  </section>

  <section class="customers-list-card">
    <app-generic-list
      [title]="'רשימת לקוחות'"
      [items]="filteredCustomers"
      [columns]="columns"
      (rowClick)="viewCustomer($event)"
      (viewClick)="viewCustomer($event)"
      (editClick)="editCustomer($event)">
    </app-generic-list>
  </section>
</section>
